{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">

        <h4 class="card-title mb-3 text-center">Login</h4>

        <form method="POST">

          <!-- Username -->
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" class="form-control" required>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>

          <!-- CAPTCHA -->
          <div class="mb-4">
            <label class="form-label text-muted small mb-1">
              Security Check
            </label>

            <!-- Generated CAPTCHA -->
            <div class="captcha-wrapper mb-2">
              <span class="captcha-text">{{ captcha }}</span>
              <a href="{{ url_for('login') }}" class="captcha-refresh" title="Refresh CAPTCHA">
                🔄
              </a>
            </div>

            <!-- User Input -->
            <input type="text" name="captcha" class="form-control"
                  placeholder="Type the code shown above"
                  autocomplete="off" required>
          </div>

          <!-- Login Button -->
          <button class="btn btn-primary w-100" type="submit">Login</button>

          <p class="mt-2 text-center">
            <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
          </p>

        </form>

        <p class="mt-3 text-center">
          Don't have an account?
          <a href="{{ url_for('register') }}">Register</a>
        </p>

      </div>
    </div>
  </div>
</div>
{% endblock %}
